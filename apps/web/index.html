<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/brand/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
    <meta property="og:image" content="/brand/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/brand/og-image.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corastate</title>
    <script>
      // Resolve theme before React mounts so the page paints in the right
      // palette. ThemeToggle is the source of truth at runtime; this
      // bootstrap mirrors its readInitialTheme().
      (function () {
        try {
          var stored = localStorage.getItem('corastate-theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
