services:
  postgres:
    image: postgres:16-alpine
    container_name: corastate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corastate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corastate}
      POSTGRES_DB: ${POSTGRES_DB:-corastate}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - corastate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-corastate} -d ${POSTGRES_DB:-corastate}']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: corastate-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8081:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha

  # Worker, backend, and web service definitions land in Week 4 alongside the
  # 30-minute clone-to-data path (phase-1-sprint-plan-v3.md §"Week 4"). The
  # Phase 1 dev loop today is `pnpm dev`, which spawns the three apps locally
  # against the dockerized Postgres above. Architecture-v3 §"Credential and
  # security architecture" locks the rule that the worker is the only process
  # holding the master key; that boundary is already in place (only the
  # worker reads CORASTATE_MASTER_KEY) regardless of where each process runs.

volumes:
  corastate_pgdata:
    driver: local
